<!DOCTYPE html>
<html>
<head>
<title>JARVIS Assistant</title>

<style>

body{
background:#020617;
color:#38bdf8;
font-family:Arial;
text-align:center;
margin-top:100px;
}

h1{
letter-spacing:4px;
}

.orb{
width:200px;
height:200px;
border-radius:50%;
margin:40px auto;
background:radial-gradient(circle,#0ea5e9,#020617);
box-shadow:
0 0 20px #0ea5e9,
0 0 40px #0ea5e9,
0 0 80px #0ea5e9;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

button{

background:#0ea5e9;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
color:white;

}

button:hover{
background:#0284c7;
}

#output{
margin-top:30px;
font-size:20px;
}

</style>
</head>

<body>

<h1>JARVIS</h1>

<div class="orb"></div>

<button onclick="startListening()">🎤 Activate</button>

<p id="output">Waiting for command...</p>

<script>

function startListening(){

const recognition = new webkitSpeechRecognition();

recognition.onresult = function(event){

let text = event.results[0][0].transcript;

document.getElementById("output").innerText = text;

}

recognition.start();

}

</script>

</body>
</html>
